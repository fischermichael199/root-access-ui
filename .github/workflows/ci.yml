# CI Workflow â root-access-ui
#
# Runs TypeScript type-checking and a production build on every push and pull
# request. This ensures the codebase compiles cleanly before any merge.
# Does NOT deploy; deployment only occurs via deploy.yml on main merges.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit catches type errors without producing output files.
      - name: Type-check
        run: npx tsc --noEmit

      # vite build produces the dist/ directory used for deployment.
      - name: Build
        run: npm run build

      # Upload build artefact so deploy.yml can reuse it without rebuilding.
      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          # Artefacts are retained for 1 day â sufficient for deploy.yml to pick up.
          retention-days: 1
